services:
  db:
    image: postgres:16

    container_name: athena-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: athena
      POSTGRES_DB: athena

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: athena-backend

    restart: unless-stopped

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    depends_on:
      - db

volumes:
  postgres_data: